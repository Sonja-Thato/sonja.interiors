<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <!-- Background -->
  <rect width="800" height="450" fill="#ececec"/>

  <!-- Large background shape -->
  <rect x="0" y="0" width="480" height="450" fill="#e0e0e0"/>

  <!-- Abstract brand mark — stacked rectangles -->
  <rect x="80" y="80" width="280" height="40" rx="4" fill="#c4c4c4"/>
  <rect x="80" y="136" width="200" height="40" rx="4" fill="#c8c8c8"/>
  <rect x="80" y="192" width="240" height="40" rx="4" fill="#c4c4c4"/>
  <rect x="80" y="248" width="160" height="40" rx="4" fill="#cccccc"/>

  <!-- Accent block -->
  <rect x="80" y="320" width="280" height="8" rx="2" fill="#b8b8b8"/>
  <rect x="80" y="340" width="180" height="8" rx="2" fill="#c8c8c8"/>

  <!-- Right panel — colour palette grid -->
  <rect x="520" y="80" width="220" height="220" rx="6" fill="#ffffff"/>
  <rect x="536" y="96"  width="96" height="88" rx="4" fill="#d8d8d8"/>
  <rect x="640" y="96"  width="84" height="88" rx="4" fill="#e8e8e8"/>
  <rect x="536" y="196" width="96" height="88" rx="4" fill="#c8c8c8"/>
  <rect x="640" y="196" width="84" height="88" rx="4" fill="#d0d0d0"/>

  <!-- Swatches row -->
  <rect x="520" y="320" width="220" height="48" rx="6" fill="#ffffff"/>
  <circle cx="548" cy="344" r="12" fill="#c0c0c0"/>
  <circle cx="580" cy="344" r="12" fill="#d0d0d0"/>
  <circle cx="612" cy="344" r="12" fill="#b8b8b8"/>
  <circle cx="644" cy="344" r="12" fill="#d8d8d8"/>
  <circle cx="676" cy="344" r="12" fill="#cccccc"/>
</svg>
