<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="628" fill="#e4e4e4"/>

  <!-- Browser window -->
  <rect x="72" y="40" width="1056" height="556" rx="10" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Browser chrome -->
  <rect x="72" y="40" width="1056" height="48" rx="10" fill="#f0f0f0"/>
  <rect x="72" y="74" width="1056" height="14" fill="#f0f0f0"/>

  <!-- Traffic lights -->
  <circle cx="108" cy="64" r="7" fill="#dcdcdc"/>
  <circle cx="128" cy="64" r="7" fill="#dcdcdc"/>
  <circle cx="148" cy="64" r="7" fill="#dcdcdc"/>

  <!-- URL bar -->
