  <!-- Card 1 -->
  <rect x="104" y="404" width="304" height="216" rx="8" fill="#ffffff"/>
  <rect x="104" y="404" width="304" height="128" rx="8" fill="#e8e8e8"/>
  <rect x="104" y="500" width="304" height="32" fill="#e8e8e8"/>
  <rect x="120" y="548" width="152" height="10" rx="3" fill="#d8d8d8"/>
  <rect x="120" y="568" width="104" height="8" rx="3" fill="#e8e8e8"/>

  <!-- Card 2 -->
  <rect x="432" y="404" width="304" height="216" rx="8" fill="#ffffff"/>
  <rect x="432" y="404" width="304" height="128" rx="8" fill="#dcdcdc"/>
  <rect x="432" y="500" width="304" height="32" fill="#dcdcdc"/>
  <rect x="448" y="548" width="152" height="10" rx="3" fill="#d0d0d0"/>
  <rect x="448" y="568" width="104" height="8" rx="3" fill="#e0e0e0"/>

  <!-- Card 3 -->
