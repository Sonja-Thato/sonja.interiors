  <rect x="376" y="168" width="448" height="12" rx="3" fill="#ebebeb"/>
  <rect x="296" y="192" width="608" height="32" rx="4" fill="#dcdcdc"/>
  <rect x="336" y="236" width="528" height="14" rx="3" fill="#e8e8e8"/>
  <rect x="376" y="260" width="448" height="14" rx="3" fill="#ebebeb"/>
  <rect x="436" y="292" width="128" height="36" rx="5" fill="#c8c8c8"/>
  <rect x="576" y="292" width="128" height="36" rx="5" fill="#e0e0e0"/>

  <!-- Cards strip background -->
